<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Format Teks</title>
  </head>
  <body>
    <!-- Teks Tebal -->
    <!-- <p>Ini adalah <strong>teks penting</strong> yang ditebalkan.</p>
    <p>
      Ini <b>juga tebal</b>, tapi tidak dianggap lebih penting secara makna.
    </p> -->

    <!-- Teks Miring -->
    <!-- <p>Ini adalah <em>teks yang ditekankan</em> secara makna.</p>
    <p>Ini <i>juga miring</i>, tapi hanya untuk gaya visual</p> -->

    <!-- Garis Bawah dan Coret -->
    <!-- <p><u>Ini teks yang digarisbawahi.</u></p>
    <p><s>Ini teks yang dicoret.</s></p> -->

    <!-- Superscript dan Subscript -->
    <!-- <p>Contoh rumus: H<sub>2</sub>O</p>
    <p>Matematika: x<sup>2</sup> + y<sup>2</sup> = z<sup>2</sup></p> -->

    <!-- Highligth & Blok Kutipan -->
    <!-- <p>Gunakan tag <mark>untuk menyorot teks</mark>.</p>
    <blockquote>"Belajar HTML itu menyenangkan dan sangat berguna!"</blockquote> -->

    <!-- Contoh Lengkap Format Teks -->
    <p>
      <strong>HTML</strong> adalah <em>bahasa dasar</em> dari semua halaman web.
    </p>

    <p>
      Air terdiri dari H<sub>2</sub>O dan rumus luas lingkaran adalah
      πr<sup>2</sup>.
    </p>

    <p><u>Teks ini digarisbawahi</u> dan <s>teks ini dicoret</s>.</p>

    <p>Gunakan <mark>highlight</mark> untuk memberi perhatian ekstra.</p>

    <blockquote>
      "Belajar sedikit setiap hari lebih baik daripada belajar banyak sekaligus
      lalu lupa."
    </blockquote>
  </body>
</html>
