<!doctype html>
<html lang="en">
  <head>

    <title>Box Shadow & Text Shadow</title>

  <style>

      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background-color: var(--warna-utama);
      padding: var(--padding-besar);
      color: 🇻ar(--warna-teks);
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
  <body>
    <h1>Efek Bayangan di CSS</h1>
    <p>Box Shadow dan Text Shadow membuat tampilan lebih menarik dan elegan.</p>

    <div class="card">
      <h2>Ini Kartu Konten</h2>
      <p>
        Efek bayangan membantu menciptakan kedalaman visual dan fokus pada

      </p>
