<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Practice CSS</title>
  </head>
  <style>
    :root {
      --warna-utama: #2ecc71;
      --warna-teks: #ffffff;
      --font-utama: "Segoe UI", sans-serif;
      --padding-besar: 24px;
    }

    body {
      font-family: var(--font-utama);
      background-color: #f4f4f4;
      padding: var(--padding-besar);
    }

    .button {
      background-color: var(--warna-utama);
      color: var(--warna-teks);
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background-color: var(--warna-utama);
      padding: var(--padding-besar);
      color: 🇻ar(--warna-teks);
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
  <body>
    <div class="kartu">
      <h2 class="kartu_judul">Judul Kartu</h2>
      <p>
        Ini adalah deskripsi konten di dalam kartu yang ditulis dengan style
        yang rapi dan terstruktur.
      </p>
      <button class="kartu_tombol">Aksi</button>
    </div>
  </body>
</html>
