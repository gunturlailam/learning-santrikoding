<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Styling CSS</title>
  </head>
  <style>
    body {
      font-family: Georgia, serif;
      background-color: #fafafa;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-style: italic;
    }

    p {
      line-height: 1.8;
      text-align: justify;
    }

    .catatan {
      font-style: oblique;
      text-align: right;
    }
  </style>
  <body>
    <h1>Belajar CSS Menjadi Menyenangkan</h1>
    <p>
      Dengan CSS, kita bisa membuat teks terlihat jauh lebih enak dibaca.
      Mengatur perataan, jarak antar baris, dan gaya huruf akan membantu
      pengguna menikmati konten tanpa merasa lelah membaca.
    </p>
    <p class="catatan">Ditulis oleh Santri Koding</p>
  </body>
</html>
